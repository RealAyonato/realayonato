<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | RealAyonato.art</title>
<link rel="icon" href="https://i.postimg.cc/qqJzc822/logo.webp">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.num{font-family:'Bebas Neue',sans-serif;font-size:clamp(6rem,20vw,12rem);line-height:1;color:transparent;-webkit-text-stroke:2px #dc2626;letter-spacing:.05em;margin-bottom:8px}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,5vw,2.5rem);letter-spacing:.05em;margin-bottom:12px}
.sub{color:#6b7280;font-size:.95rem;line-height:1.7;max-width:380px;margin:0 auto 32px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#dc2626;color:#fff;border-radius:8px;font-weight:700;font-size:.9rem;text-decoration:none;transition:background .2s,transform .2s}
.btn:hover{background:#ef4444;transform:translateY(-2px)}
img{width:64px;height:64px;border-radius:50%;margin:0 auto 20px;border:3px solid rgba(220,38,38,.4);display:block}
</style>
</head>
<body>
<div>
  <img src="https://i.postimg.cc/qqJzc822/logo.webp" alt="RealAyonato">
  <div class="num">404</div>
  <div class="title">Page Not Found</div>
  <p class="sub">Looks like this page doesn't exist. Maybe it was moved, or you followed a broken link.</p>
  <a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
